<title>Kreatif Nusantara</title>
<meta name="description" content="Platform kreator, UMKM, dan brand dalam satu ekosistem." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root {
    --bg: #ffffff;
    --bg-soft: #f4f6f9;
    --surface: #ffffff;
    --surface-hi: #f6f8fb;
    --text: #1e293b;
    --text-muted: #64748b;
    --gold: #1e3a5f;
    --coral: #2c5282;
    --teal: #14304d;
    --violet: #4a7ab5;
    --border: rgba(30, 41, 59, 0.12);
    --font-fraunces: 'Fraunces', serif;
    --font-jakarta: 'Plus Jakarta Sans', sans-serif;
    --font-plexmono: 'IBM Plex Mono', monospace;
  }

  html { height: 100%; }

  body {
    min-height: 100%;
    margin: 0;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 80% 50% at 15% -10%, rgba(30, 58, 95, 0.08), transparent),
      radial-gradient(ellipse 60% 40% at 100% 0%, rgba(20, 48, 77, 0.06), transparent);
    color: var(--text);
    font-family: var(--font-jakarta);
  }

  #root { min-height: 100vh; display: flex; flex-direction: column; }

  .font-display { font-family: var(--font-fraunces); }
  .font-mono { font-family: var(--font-plexmono); }

  ::selection { background: var(--gold); color: #ffffff; }

  .kn-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: 0 1px 3px rgba(30, 41, 59, 0.05);
  }

  .kn-card-hi {
    background: var(--surface-hi);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: 0 1px 3px rgba(30, 41, 59, 0.05);
  }

  .kn-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    border-radius: 999px;
    padding: 0.7rem 1.4rem;
    font-weight: 600;
    font-size: 0.9rem;
    transition: transform 0.15s ease, opacity 0.15s ease;
    cursor: pointer;
    border: none;
    font-family: var(--font-jakarta);
  }

  .kn-btn:active { transform: scale(0.97); }
  .kn-btn:disabled { cursor: not-allowed; }

  .kn-btn-primary { background: var(--gold); color: #ffffff; }
  .kn-btn-primary:hover { opacity: 0.9; }

  .kn-btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .kn-btn-ghost:hover { background: rgba(30, 41, 59, 0.05); }

  .kn-input {
    width: 100%;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.7rem 0.9rem;
    color: var(--text);
    font-family: var(--font-jakarta);
    outline: none;
    box-sizing: border-box;
  }
  .kn-input:focus { border-color: var(--gold); }

  .kn-label {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 0.35rem;
    display: block;
  }

  .kn-eyebrow {
    font-family: var(--font-plexmono);
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
  }

  @keyframes page-flip {
    from { opacity: 0; transform: rotateY(8deg) translateX(12px); }
    to { opacity: 1; transform: rotateY(0) translateX(0); }
  }

  .kn-page-flip {
    animation: page-flip 0.35s ease;
    transform-style: preserve-3d;
  }

  @media (prefers-reduced-motion: reduce) {
    .kn-page-flip { animation: none; }
  }

  a { text-decoration: none; color: inherit; }
  button { font-family: var(--font-jakarta); }
</style>
</head>

// ==================== lib/store.js (adaptasi) ====================
const NS = "kn-app:";

function readJSON(key, fallback) {
  if (typeof window === "undefined") return fallback;
  try {
    const raw = window.localStorage.getItem(NS + key);
    if (!raw) return fallback;
    return JSON.parse(raw);
  } catch (e) {
    return fallback;
  }
}

function writeJSON(key, value) {
  if (typeof window === "undefined") return;
  try {
    window.localStorage.setItem(NS + key, JSON.stringify(value));
  } catch (e) {
    // ignore quota errors dalam demo ini
  }
}

function clearAll() {
  if (typeof window === "undefined") return;
  Object.keys(window.localStorage)
    .filter((k) => k.startsWith(NS))
    .forEach((k) => window.localStorage.removeItem(k));
}

// ==================== Router sederhana berbasis hash ====================
function parseHash() {
  let raw = window.location.hash || "";
  if (raw.startsWith("#")) raw = raw.slice(1);
  if (!raw.startsWith("/")) raw = "/" + raw;
  const [path, queryString] = raw.split("?");
  const query = {};
  if (queryString) {
    queryString.split("&").forEach((pair) => {
      const [k, v] = pair.split("=");
      if (k) query[decodeURIComponent(k)] = decodeURIComponent(v || "");
    });
  }
  const segments = path.split("/").filter(Boolean);
  return { path, segments, query };
}

function useHashRoute() {
  const [route, setRoute] = useState(parseHash());

  useEffect(() => {
    function onHashChange() {
      setRoute(parseHash());
      window.scrollTo(0, 0);
    }
    window.addEventListener("hashchange", onHashChange);
    return () => window.removeEventListener("hashchange", onHashChange);
  }, []);

  return route;
}

function navigateTo(href) {
  window.location.hash = href;
}

function Link({ href, className, onClick, children, style, "aria-label": ariaLabel }) {
  return (
    <a
      href={`#${href}`}
      className={className}
      style={style}
      aria-label={ariaLabel}
      onClick={(e) => {
        if (onClick) onClick(e);
      }}
    >
      {children}
    </a>
  );
}

function emptyProgress() {
  return { ebookRead: false, videoRead: false, levelsPassed: [], certificate: false, certCode: "", certDate: "" };
}

function TopicPage({ topicId, modeParam }) {
  const topic = getTopicById(topicId);

  const [profile, setProfile] = useState(defaultProfile);
  const [mode, setMode] = useState(modeParam === "video" ? "video" : "ebook");
  const [page, setPage] = useState(0);
  const [progressAll, setProgressAll] = useState({});
  const [view, setView] = useState("content"); // content | quiz | result | certificate
  const [quizLevel, setQuizLevel] = useState(1);
  const [answers, setAnswers] = useState({});
  const [lastScore, setLastScore] = useState(null);

  useEffect(() => {
    setProfile(readJSON(KEYS.PROFILE, defaultProfile));
    const all = readJSON(KEYS.LEARNING, {});
    setProgressAll(all);
    const p = all[topicId] || emptyProgress();
    if (p.certificate) setView("certificate");
    const nextLevel = [1, 2, 3].find((l) => !p.levelsPassed?.includes(l)) || 3;
    setQuizLevel(nextLevel);
    setMode(modeParam === "video" ? "video" : "ebook");
    setPage(0);
    setView(p.certificate ? "certificate" : "content");
    setAnswers({});
    setLastScore(null);
    // eslint-disable-next-line
  }, [topicId]);

  if (!topic) {
    return (
      <div className="mx-auto max-w-2xl px-5 py-16 text-center">
        <p>Modul tidak ditemukan.</p>
        <Link href="/learning" className="kn-btn kn-btn-primary mt-4">
          Kembali ke Learning Centre
        </Link>
      </div>
    );
  }

  const progress = progressAll[topicId] || emptyProgress();

  function persist(next) {
    const all = { ...progressAll, [topicId]: next };
    setProgressAll(all);
    writeJSON(KEYS.LEARNING, all);
  }

  function markContentDone() {
    const next = { ...progress };
    if (mode === "ebook") next.ebookRead = true;
    else next.videoRead = true;
    persist(next);
    setView("quiz");
  }

  function selectAnswer(qIndex, optIndex) {
    setAnswers((a) => ({ ...a, [qIndex]: optIndex }));
  }

  function submitQuiz() {
    const questions = topic.quiz[quizLevel];
    let correct = 0;
    questions.forEach((q, i) => {
      if (answers[i] === q.answer) correct += 1;
    });
    const score = Math.round((correct / questions.length) * 100);
    setLastScore(score);

    const passed = score >= 80;
    const next = { ...progress };
    if (passed && !next.levelsPassed.includes(quizLevel)) {
      next.levelsPassed = [...next.levelsPassed, quizLevel];
    }

    if (passed && quizLevel === 3) {
      next.certificate = true;
      next.certCode = `KN-${topic.id.toUpperCase().slice(0, 4)}-${Date.now()
        .toString()
        .slice(-6)}`;
      next.certDate = new Date().toLocaleDateString("id-ID", {
        day: "2-digit",
        month: "long",
        year: "numeric",
      });
    }

    persist(next);
    setView("result");
  }

  function nextAfterResult() {
    const passed = lastScore >= 80;
    if (!passed) {
      setAnswers({});
      setView("quiz");
      return;
    }
    if (quizLevel === 3) {
      setView("certificate");
    } else {
      setQuizLevel((l) => l + 1);
      setAnswers({});
      setView("quiz");
    }
  }

  function retryLevel() {
    setAnswers({});
    setView("quiz");
  }

  const questions = topic.quiz[quizLevel];
  const answeredCount = Object.keys(answers).length;

  return (
    <div className="mx-auto max-w-3xl px-5 py-10">
      <Link
        href="/learning"
        className="text-sm text-[var(--text-muted)] hover:text-[var(--text)]"
      >
        ← Learning Centre
      </Link>

      <div className="flex items-center gap-3 mt-4 mb-2">
        <span
          className="h-3 w-3 rounded-full"
          style={{ background: topic.color }}
        />
        <p className="kn-eyebrow" style={{ color: topic.color }}>
          {mode === "ebook" ? "E-Book" : "Video Learning"}
        </p>
      </div>
      <h1 className="font-display text-3xl md:text-4xl mb-8">
        {topic.title}
      </h1>

      {view === "content" && mode === "ebook" && (
        <EbookReader
          topic={topic}
          page={page}
          setPage={setPage}
          onDone={markContentDone}
        />
      )}

      {view === "content" && mode === "video" && (
        <VideoPlaceholder topic={topic} onDone={markContentDone} />
      )}

      {view === "quiz" && (
        <QuizPanel
          topic={topic}
          level={quizLevel}
          questions={questions}
          answers={answers}
          onSelect={selectAnswer}
          onSubmit={submitQuiz}
          answeredCount={answeredCount}
        />
      )}

      {view === "result" && (
        <ResultPanel
          score={lastScore}
          level={quizLevel}
          onNext={nextAfterResult}
          onRetry={retryLevel}
        />
      )}

      {view === "certificate" && (
        <div className="space-y-5">
          <Certificate
            name={profile.nama}
            topicTitle={topic.title}
            code={progress.certCode || "-"}
            date={progress.certDate || "-"}
          />
          <div className="text-center">
            <Link href="/learning" className="kn-btn kn-btn-ghost">
              Kembali ke Learning Centre
            </Link>
          </div>
        </div>
      )}
    </div>
  );
}

// Mengambil video ID dari berbagai format link YouTube (watch, youtu.be, shorts, embed),
// atau menerima langsung video ID mentah.
function getYoutubeId(url) {
  if (!url) return null;
  const trimmed = url.trim();
  const patterns = [
    /youtu\.be\/([a-zA-Z0-9_-]{6,})/,
    /youtube\.com\/watch\?v=([a-zA-Z0-9_-]{6,})/,
    /youtube\.com\/embed\/([a-zA-Z0-9_-]{6,})/,
    /youtube\.com\/shorts\/([a-zA-Z0-9_-]{6,})/,
  ];
  for (const p of patterns) {
    const m = trimmed.match(p);
    if (m) return m[1];
  }
  if (/^[a-zA-Z0-9_-]{6,}$/.test(trimmed)) return trimmed;
  return null;
}

const VALID_CODES = ["CR01", "CR02", "CR03"];

function AffiliatorPage() {

    tiktokLink: "",
    instagram: "",
    instagramLink: "",
    facebook: "",
    facebookLink: "",
  });
  const [stage, setStage] = useState("form"); // form | waiting | approved | linking
  const [linked, setLinked] = useState({ tiktok: false, instagram: false, facebook: false });

  function update(field, value) {
    setForm((f) => ({ ...f, [field]: value }));
  }

  function checkCode(e) {
    e.preventDefault();
    if (VALID_CODES.includes(code.trim().toUpperCase())) {
      setCodeStatus("success");
      writeJSON(KEYS.AFFILIATOR, { method: "existing", code: code.trim().toUpperCase(), status: "approved" });

    writeJSON(KEYS.AFFILIATOR, { method: "new", ...form, status: "waiting" });

  { label: "Total Save", value: "22.910", sub: "Semua platform", color: "var(--teal)" },
];

function BrandDashboardPage() {
  const [roiModel, setRoiModel] = useState("emv"); // emv | contentSelling

  const [views, setViews] = useState(4820000);
  const [engagement, setEngagement] = useState(72650);
  const [hargaViews, setHargaViews] = useState(15);
  const [hargaEngagement, setHargaEngagement] = useState(350);
  const [contentSellingRevenue, setContentSellingRevenue] = useState(64500000);
  const [campaignCost, setCampaignCost] = useState(38000000);

  const emv = useMemo(() => {
    return views * hargaViews + engagement * hargaEngagement;
  }, [views, engagement, hargaViews, hargaEngagement]);

  const roiValue = roiModel === "emv" ? emv : contentSellingRevenue;
  const roiPercent = campaignCost > 0 ? ((roiValue - campaignCost) / campaignCost) * 100 : 0;

  return (
    <div className="mx-auto max-w-6xl px-5 py-12">
      <p className="kn-eyebrow mb-3" style={{ color: "var(--gold)" }}>
        Data & Insight as a Service
      </p>

        Dashboard Monitoring Performa Campaign
      </h1>
      <p className="text-[var(--text-muted)] mb-8 max-w-xl">
        Seluruh angka pada dashboard ini adalah data simulasi untuk keperluan
        demo produk.
      </p>

      <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-10">
        {STATS.map((s) => (
          <div key={s.label} className="kn-card p-5">
            <p className="kn-eyebrow mb-2" style={{ color: s.color }}>{s.label}</p>
            <p className="font-display text-3xl mb-1">{s.value}</p>
            <p className="text-xs text-[var(--text-muted)]">{s.sub}</p>
          </div>
        ))}
      </div>

      <div className="kn-card p-6 md:p-8">
        <div className="flex items-center justify-between flex-wrap gap-4 mb-6">
          <div>
            <p className="kn-eyebrow mb-2" style={{ color: "var(--coral)" }}>ROI Outstanding</p>
            <h2 className="font-display text-2xl">Kalkulator ROI Campaign</h2>
          </div>
          <div className="flex gap-2">
            <button
              onClick={() => setRoiModel("contentSelling")}
              className={`kn-btn text-sm ${roiModel === "contentSelling" ? "kn-btn-primary" : "kn-btn-ghost"}`}
            >
              Model Content Selling Link
            </button>
            <button
              onClick={() => setRoiModel("emv")}
              className={`kn-btn text-sm ${roiModel === "emv" ? "kn-btn-primary" : "kn-btn-ghost"}`}
            >
              Model EMV
            </button>
          </div>
        </div>

        {roiModel === "emv" ? (
          <div className="grid md:grid-cols-2 gap-6">
            <div className="space-y-4">
              <NumberField label="Total Views" value={views} onChange={setViews} />
              <NumberField label="Total Engagement" value={engagement} onChange={setEngagement} />
              <NumberField label="Harga per View (Rp)" value={hargaViews} onChange={setHargaViews} />
              <NumberField label="Harga per Engagement (Rp)" value={hargaEngagement} onChange={setHargaEngagement} />
              <NumberField label="Biaya Campaign (Rp)" value={campaignCost} onChange={setCampaignCost} />
              <p className="text-xs text-[var(--text-muted)]">
                Rumus: EMV = (Total Views × Harga Views) + (Total Engagement × Harga Engagement)
              </p>
            </div>
            <ResultCard emv={emv} campaignCost={campaignCost} roiPercent={roiPercent} />
          </div>
        ) : (
          <div className="grid md:grid-cols-2 gap-6">
            <div className="space-y-4">
              <NumberField label="Revenue dari Content Selling Link (Rp)" value={contentSellingRevenue} onChange={setContentSellingRevenue} />
              <NumberField label="Biaya Campaign (Rp)" value={campaignCost} onChange={setCampaignCost} />
              <p className="text-xs text-[var(--text-muted)]">
                Model ini menghitung ROI langsung dari revenue penjualan yang tercatat melalui link afiliasi kreator.
              </p>
            </div>
            <ResultCard emv={contentSellingRevenue} campaignCost={campaignCost} roiPercent={roiPercent} />
          </div>
        )}
      </div>
    </div>
  );
}

function NumberField({ label, value, onChange }) {
  return (
    <div>
      <label className="kn-label">{label}</label>
      <input
        type="number"
        className="kn-input font-mono"
        value={value}
        onChange={(e) => onChange(Number(e.target.value) || 0)}
      />
    </div>
  );
}

function ResultCard({ emv, campaignCost, roiPercent }) {
  const positive = roiPercent >= 0;
  return (
    <div className="kn-card-hi p-6 flex flex-col justify-center">
      <p className="kn-eyebrow mb-2">Estimasi Nilai</p>
      <p className="font-display text-3xl mb-1">
        Rp {emv.toLocaleString("id-ID")}
      </p>
      <p className="text-xs text-[var(--text-muted)] mb-5">

      </p>
      <p className="font-display text-4xl" style={{ color: positive ? "var(--teal)" : "var(--coral)" }}>

    e.preventDefault();
    const list = readJSON(KEYS.WHITELISTING, []);
    list.push({ ...form, submittedAt: new Date().toISOString() });
    writeJSON(KEYS.WHITELISTING, list);
    setSubmitted(true);
  }

  if (submitted) {
    return (
      <div className="mx-auto max-w-xl px-5 py-20 text-center">
        <div className="kn-card p-10">
          <p className="text-4xl mb-4">✅</p>
          <h1 className="font-display text-2xl mb-3">
            Selamat atas pengajuan anda
          </h1>
          <p className="text-[var(--text-muted)]">
            Pihak KN akan segera menghubungi permintaan anda terkait Content
            Usage Fee untuk campaign{" "}
            <strong className="text-[var(--text)]">{form.namaCampaign}</strong>.
          </p>
        </div>
      </div>
    );
  }

  return (
    <div className="mx-auto max-w-xl px-5 py-12">
      <p className="kn-eyebrow mb-3" style={{ color: "var(--coral)" }}>
        Content Usage Fee / Whitelisting
      </p>
      <h1 className="font-display text-3xl md:text-4xl mb-3">
        Ajukan penggunaan konten kreator.
      </h1>
      <p className="text-[var(--text-muted)] mb-8">
        Isi form berikut untuk mengajukan whitelisting konten kreator sebagai
        materi iklan brand kamu.
      </p>

      <form onSubmit={submit} className="kn-card p-6 md:p-8 space-y-5">
        <Field label="Nama Penanggung Jawab">
          <input required className="kn-input" value={form.penanggungJawab} onChange={(e) => update("penanggungJawab", e.target.value)} />
        </Field>
        <Field label="Nama Brand">
          <input required className="kn-input" value={form.namaBrand} onChange={(e) => update("namaBrand", e.target.value)} />
        </Field>
        <Field label="Nama Campaign">
          <input required className="kn-input" value={form.namaCampaign} onChange={(e) => update("namaCampaign", e.target.value)} />
        </Field>
        <Field label="Deskripsi Whitelisting">
          <textarea required rows={4} className="kn-input" value={form.deskripsi} onChange={(e) => update("deskripsi", e.target.value)} placeholder="Jelaskan konten yang ingin digunakan, durasi penggunaan, dan platform iklan." />
        </Field>

        <button type="submit" className="kn-btn kn-btn-primary">
          Submit Pengajuan
        </button>
      </form>
    </div>
  );
}

// ==================== components/RoleGate.js ====================
// Membungkus sebuah halaman: jika status pengguna saat ini tidak termasuk
// daftar allowed, halaman tetap dirender (agar user bisa lihat fitur apa
// saja yang ada) tapi tampil blur dengan overlay ajakan ganti status.
const ROLE_LABELS = {
  Creator: "Creator",
  UMKM: "UMKM",
  Brand: "Brand",
};

function RoleGate({ allowed, roleLabel, children }) {
  const [profile, setProfile] = useState(defaultProfile);

  useEffect(() => {
    setProfile(readJSON(KEYS.PROFILE, defaultProfile));
    const onFocus = () => setProfile(readJSON(KEYS.PROFILE, defaultProfile));
    window.addEventListener("focus", onFocus);
    window.addEventListener("kn:profile-updated", onFocus);
    return () => {
      window.removeEventListener("focus", onFocus);
      window.removeEventListener("kn:profile-updated", onFocus);
    };
  }, []);

  const accessible = allowed.includes(profile.role || "");

  if (accessible) return children;

  return (
    <div className="relative">
      <div className="blur-[4px] pointer-events-none select-none opacity-50" aria-hidden="true">
        {children}
      </div>

      <div className="fixed inset-0 z-30 flex items-center justify-center px-5">
        <div className="kn-card p-8 text-center max-w-sm bg-[var(--surface)]">
          <p className="text-4xl mb-4">🔒</p>
          <h2 className="font-display text-xl mb-2">
            Fitur khusus status {roleLabel}
          </h2>
          <p className="text-sm text-[var(--text-muted)] mb-6">
            Status kamu saat ini{" "}
            {profile.role ? (
              <>
                adalah <strong className="text-[var(--text)]">{profile.role}</strong>
              </>
            ) : (
              "belum dipilih"
            )}
            . Ubah status pengguna dulu di halaman Personal untuk membuka fitur ini.
          </p>
          <Link href="/personal" className="kn-btn kn-btn-primary">
            Ubah Status Pengguna
          </Link>
        </div>
      </div>
    </div>
  );
}

// ==================== App root & routing ====================
function App() {
  const route = useHashRoute();
  const { segments, query, path } = route;

  let page = null;

  if (segments.length === 0) {
    page = <HomePage />;
  } else if (segments[0] === "personal") {
    page = <PersonalPage />;
  } else if (segments[0] === "learning" && segments.length === 1) {
    page = (
      <RoleGate allowed={["Creator", ""]} roleLabel="Creator">
        <LearningCentrePage />
      </RoleGate>
    );
  } else if (segments[0] === "learning" && segments.length >= 2) {
    page = (
      <RoleGate allowed={["Creator", ""]} roleLabel="Creator">
        <TopicPage key={segments[1] + (query.mode || "")} topicId={segments[1]} modeParam={query.mode} />
      </RoleGate>
    );
  } else if (segments[0] === "affiliator") {
    page = (
      <RoleGate allowed={["Creator", ""]} roleLabel="Creator">
        <AffiliatorPage />
      </RoleGate>
    );
  } else if (segments[0] === "umkm") {
    page = (
      <RoleGate allowed={["UMKM", ""]} roleLabel="UMKM">
        <UmkmPage />
      </RoleGate>
    );
  } else if (segments[0] === "brand" && segments[1] === "dashboard") {
    page = (
      <RoleGate allowed={["Brand", ""]} roleLabel="Brand">
        <BrandDashboardPage />
      </RoleGate>
    );
  } else if (segments[0] === "brand" && segments[1] === "whitelisting") {
    page = (
      <RoleGate allowed={["Brand", ""]} roleLabel="Brand">
        <WhitelistingPage />
      </RoleGate>
    );
  } else {
    page = (
      <div className="mx-auto max-w-2xl px-5 py-16 text-center">
        <p>Halaman tidak ditemukan.</p>
        <Link href="/" className="kn-btn kn-btn-primary mt-4">
          Kembali ke Beranda
        </Link>
      </div>
    );
  }

  const currentPath = "/" + segments.join("/");
  const navPath = currentPath === "/" ? "/" : currentPath;

  return (
    <React.Fragment>
      <Nav currentPath={segments.length === 0 ? "/" : navPath} />
      <main className="flex-1 w-full">{page}</main>
      <footer className="border-t border-black/10 py-6 text-center text-xs text-[var(--text-muted)]">
        Kreatif Nusantara — dibangun sebagai demo produk (data bersifat
        simulasi).
      </footer>
    </React.Fragment>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
